<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speacher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e2e2;
    }

    .card {
      width: min(640px, 92vw);
      background: #1a1a24;
      border: 1px solid #2e2e42;
      border-radius: 16px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
    }

    h1 span { color: #7c6bff; }

    textarea {
      width: 100%;
      height: 220px;
      background: #111118;
      border: 1px solid #2e2e42;
      border-radius: 10px;
      color: #e2e2e2;
      font-size: 1rem;
      line-height: 1.6;
      padding: 0.9rem 1rem;
      resize: vertical;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }

    textarea::placeholder { color: #555; }
    textarea:focus { border-color: #7c6bff; }

    .voice-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .voice-row label {
      font-size: 0.82rem;
      color: #888;
      white-space: nowrap;
    }

    select {
      flex: 1;
      background: #111118;
      border: 1px solid #2e2e42;
      border-radius: 8px;
      color: #e2e2e2;
      font-size: 0.875rem;
      padding: 0.55rem 0.85rem;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
      cursor: pointer;
    }

    select:focus { border-color: #7c6bff; }

    .controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    button {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      font-family: inherit;
    }

    button:active:not(:disabled) { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    #btn-speak { background: #7c6bff; color: #fff; }
    #btn-speak:hover:not(:disabled) { opacity: 0.88; }

    #btn-stop { background: #2e2e42; color: #bbb; }
    #btn-stop:hover:not(:disabled) { opacity: 0.8; }


    .status {
      font-size: 0.82rem;
      color: #666;
      margin-left: auto;
    }

    .status.active { color: #7c6bff; }

    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      margin-right: 4px;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Spea<span>cher</span></h1>

    <textarea id="text" placeholder="Type or paste any text here…"></textarea>

    <div class="voice-row">
      <label for="voice-select">Voice</label>
      <select id="voice-select">
        <option disabled selected>Loading voices…</option>
      </select>
    </div>

    <div class="controls">
      <button id="btn-speak">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        Speak
      </button>

      <button id="btn-stop" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h12v12H6z"/>
        </svg>
        Stop
      </button>

<span class="status" id="status">Ready</span>
    </div>
  </div>

  <script>
    const synth      = window.speechSynthesis;
    const textarea   = document.getElementById('text');
    const btnSpeak   = document.getElementById('btn-speak');
    const btnStop    = document.getElementById('btn-stop');
    const voiceSelect = document.getElementById('voice-select');
    const statusEl   = document.getElementById('status');

    const STORAGE_KEY = 'speacher_voice';
    let voices = [];

    function loadVoices() {
      const list = synth.getVoices();
      if (!list.length) return;
      voices = list;
      voiceSelect.innerHTML = voices.map((v, i) =>
        `<option value="${i}">${v.name} (${v.lang})</option>`
      ).join('');

      const saved = localStorage.getItem(STORAGE_KEY);
      const savedIdx = saved ? voices.findIndex(v => v.name === saved) : -1;
      if (savedIdx >= 0) {
        voiceSelect.selectedIndex = savedIdx;
      } else {
        const def = voices.findIndex(v => v.default);
        voiceSelect.selectedIndex = def >= 0 ? def : 0;
      }
    }

    loadVoices();
    synth.addEventListener('voiceschanged', loadVoices);

    voiceSelect.addEventListener('change', () => {
      const v = voices[parseInt(voiceSelect.value)];
      if (v) localStorage.setItem(STORAGE_KEY, v.name);
    });

    function selectedVoice() {
      return voices[parseInt(voiceSelect.value)] ?? null;
    }

    function setStatus(speaking) {
      if (speaking) {
        statusEl.innerHTML = '<span class="dot"></span>Speaking…';
        statusEl.className = 'status active';
      } else {
        statusEl.textContent = 'Ready';
        statusEl.className = 'status';
      }
      btnStop.disabled = !speaking;
    }

    btnSpeak.addEventListener('click', () => {
      const text = textarea.value.trim();
      if (!text) return;
      synth.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.voice   = selectedVoice();
      utt.onstart = () => setStatus(true);
      utt.onend   = () => setStatus(false);
      utt.onerror = () => setStatus(false);
      synth.speak(utt);
    });

    btnStop.addEventListener('click', () => {
      synth.cancel();
      setStatus(false);
    });

  </script>
</body>
</html>
